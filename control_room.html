<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlphaDog Control Room</title>
<style>
  body{background:#0b0f14;color:#00ff88;font-family:monospace;padding:10px;margin:0}
  h2{margin:8px 0 10px;font-size:21px;color:#00ff88}
  h3{margin:12px 0 6px;color:#fff;font-size:14px}
  .section{border-top:1px solid #30363d;padding-top:8px;margin-top:10px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  button{padding:10px 4px;font-size:12px;border:none;border-radius:7px;background:#1f6feb;color:#fff}
  button:active{transform:scale(.97);opacity:.8}
  .clean{background:#da3633}
  .check{background:#238636}
  .sql{background:#d29922}
  .debug{background:#8957e5}
  .audit{background:#0f766e}
  .copy{background:#8957e5;width:100%;margin-top:6px}
  textarea{width:100%;height:90px;margin-top:8px;background:#111;color:#00ff88;padding:8px;border:1px solid #30363d;border-radius:6px;box-sizing:border-box}
  pre{background:#000;color:#00ff88;padding:8px;margin-top:8px;overflow:auto;max-height:420px;min-height:150px;border:1px solid #30363d;border-radius:6px;white-space:pre-wrap;word-break:break-word}
  .status{background:#111;color:#fff;padding:8px;border-radius:6px;border:1px solid #30363d;margin:8px 0;white-space:pre-wrap}
  .small{font-size:11px;color:#aaa;margin-bottom:6px}
</style>
</head>
<body>
<h2>ALPHADOG CONTROL ROOM</h2>
<div class="small">Target date: <span id="targetDateLabel"></span></div>
<div class="status" id="status">READY</div>

<div class="section"><h3>DEBUG</h3><div class="grid">
<button class="debug" onclick="debugConfig()">Config</button>
<button class="debug" onclick="health()">Health</button>
<button class="debug" onclick="testSQL()">SQL Test</button>
<button class="debug" onclick="clearOutput()">Clear</button>
</div></div>

<div class="section"><h3>SCRAPE</h3><div class="grid">
<button onclick="runJobButton('Markets','scrape_games_markets')">Markets</button>
<button onclick="runJobButton('G1','scrape_starters_group_1')">G1</button>
<button onclick="runJobButton('G2','scrape_starters_group_2')">G2</button>
<button onclick="runJobButton('G3','scrape_starters_group_3')">G3</button>
<button onclick="runJobButton('Teams','scrape_teams')">Teams</button>
<button onclick="runJobButton('Bullpen','scrape_bullpens')">Bullpen</button>
<button onclick="runJobButton('Lineups','scrape_lineups')">Lineups</button>
<button onclick="runJobButton('Players','scrape_players')">Players</button>
</div></div>

<div class="section"><h3>CLEAN</h3><div class="grid">
<button class="clean" onclick="runSQLButton('Clean Full', cleanAll())">Full</button>
<button class="clean" onclick="runSQLButton('Clean Starters', cleanStarters())">Starters</button>
<button class="clean" onclick="runSQLButton('Clean Markets', cleanMarkets())">Markets</button>
<button class="clean" onclick="runSQLButton('Clean Games', cleanGames())">Games</button>
</div></div>

<div class="section"><h3>CHECK</h3><div class="grid">
<button class="check" onclick="runSQLButton('Check Games', checkGames())">Games</button>
<button class="check" onclick="runSQLButton('Check Markets', checkMarkets())">Markets</button>
<button class="check" onclick="runSQLButton('Check Starters', checkStarters())">Starters</button>
<button class="check" onclick="runSQLButton('Check Teams', checkTeams())">Teams</button>
<button class="check" onclick="runSQLButton('Game List', listGames())">Game List</button>
<button class="check" onclick="runSQLButton('Starter List', listStarters())">Starter List</button>
<button class="check" onclick="runSQLButton('Bad Starters', badStarters())">Bad Start</button>
<button class="audit" onclick="runSQLButton('Truth Audit', truthAudit())">Truth Audit</button>
<button class="check" onclick="runSQLButton('Tasks', latestTasks())">Tasks</button>
</div></div>

<div class="section"><h3>MANUAL SQL</h3>
<textarea id="sql">SELECT COUNT(*) AS games_today FROM games WHERE game_date = '2026-04-24';</textarea>
<button class="sql" onclick="runManualSQL()">Run SQL</button>
</div>

<pre id="output">Output will appear here.</pre>
<button class="copy" onclick="copyOutput()">COPY OUTPUT</button>

<script>
const BASE = "https://prop-ingestion-git.rodolfoaamattos.workers.dev";
const JOB_URL = BASE + "/tasks/run";
const SQL_URL = BASE + "/debug/sql";
const HEALTH_URL = BASE + "/health";
const TOKEN = "PUT_YOUR_TOKEN_HERE";

// SINGLE DATE VARIABLE. Change only this line for controlled testing.
const TARGET_DATE = "2026-04-24";

document.getElementById("targetDateLabel").textContent = TARGET_DATE;

function nowStamp(){ return new Date().toLocaleTimeString(); }
function setStatus(msg){ document.getElementById("status").textContent = "[" + nowStamp() + "] " + msg; }
function setOutput(label, obj){
  const payload = typeof obj === "string" ? obj : JSON.stringify(obj,null,2);
  document.getElementById("output").textContent = "ACTION: " + label + "\nTIME: " + new Date().toISOString() + "\n\n" + payload;
  window.scrollTo(0, document.body.scrollHeight);
}
function loading(label, extra){
  setStatus("RUNNING: " + label);
  setOutput(label, "Loading..." + (extra ? "\n" + extra : ""));
}
function clearOutput(){ setStatus("READY"); setOutput("Clear","Output cleared."); }
function debugConfig(){
  setOutput("Config",{
    base: BASE,
    job_url: JOB_URL,
    sql_url: SQL_URL,
    target_date: TARGET_DATE,
    token_set: TOKEN !== "PUT_YOUR_TOKEN_HERE",
    version: "control_room_truth_audit_2026_04_24"
  });
}

async function rawRequest(label, url, payload){
  const headers = {"Content-Type":"application/json","x-ingest-token":TOKEN};
  const options = payload === null ? {method:"GET",headers} : {method:"POST",headers,body:JSON.stringify(payload)};
  try{
    const res = await fetch(url, options);
    const text = await res.text();
    let body;
    try { body = JSON.parse(text); } catch(e){ body = text; }
    return {http_status:res.status, body};
  } catch(err){
    return {ok:false, error:String(err), action:label};
  }
}

async function requestJSON(label, url, payload){
  loading(label);
  const result = await rawRequest(label, url, payload);
  setStatus("DONE: " + label + " / HTTP " + (result.http_status || "ERR"));
  setOutput(label, result);
  return result;
}

function shouldRetry(result){
  const raw = JSON.stringify(result || {});
  if (raw.includes("503") || raw.includes("UNAVAILABLE") || raw.includes("high demand") || raw.includes("Load failed") || raw.includes("cancelled")) return true;

  const inserted = result && result.body && result.body.inserted;
  if (inserted) {
    const vals = Object.values(inserted).map(Number);
    if (vals.length && vals.every(v => v === 0)) return true;
  }
  return false;
}

async function requestJobWithRetry(label, job){
  const attempts = [];
  for (let i=1; i<=3; i++){
    loading(label, "Try " + i + " of 3 started.");
    const result = await rawRequest(label + " try " + i, JOB_URL, {job});
    attempts.push({try:i,result});

    if (!shouldRetry(result)) {
      setStatus("DONE: " + label + " / success");
      setOutput(label, {final:"success", attempts});
      return;
    }

    if (i < 3) {
      setStatus("RETRYING: " + label + " / try " + i + " failed");
      setOutput(label, {status:"retrying", reason:"503/cancelled/zero inserted", next_try:i+1, attempts});
      await new Promise(r => setTimeout(r, 10000));
    }
  }
  setStatus("FAILED: " + label + " after 3 tries");
  setOutput(label, {final:"failed_after_3_attempts", attempts});
}

function health(){ requestJSON("Health", HEALTH_URL, null); }
function testSQL(){ requestJSON("SQL Test", SQL_URL, {sql:"SELECT COUNT(*) AS total_games FROM games;"}); }
function runJobButton(label, job){ requestJobWithRetry(label, job); }
function runSQLButton(label, sql){ requestJSON(label, SQL_URL, {sql}); }
function runManualSQL(){ runSQLButton("Manual SQL", document.getElementById("sql").value); }
function copyOutput(){ navigator.clipboard.writeText(document.getElementById("output").textContent); setStatus("COPIED OUTPUT"); }

function cleanAll(){ return `DELETE FROM starters_current WHERE game_id LIKE '${TARGET_DATE}_%'; DELETE FROM bullpens_current WHERE game_id LIKE '${TARGET_DATE}_%'; DELETE FROM lineups_current WHERE game_id LIKE '${TARGET_DATE}_%'; DELETE FROM markets_current WHERE game_id LIKE '${TARGET_DATE}_%'; DELETE FROM games WHERE game_date = '${TARGET_DATE}';`; }
function cleanStarters(){ return `DELETE FROM starters_current WHERE game_id LIKE '${TARGET_DATE}_%';`; }
function cleanMarkets(){ return `DELETE FROM markets_current WHERE game_id LIKE '${TARGET_DATE}_%';`; }
function cleanGames(){ return `DELETE FROM games WHERE game_date = '${TARGET_DATE}';`; }

function checkGames(){ return `SELECT COUNT(*) AS games_today FROM games WHERE game_date = '${TARGET_DATE}';`; }
function checkMarkets(){ return `SELECT COUNT(*) AS markets_today FROM markets_current WHERE game_id LIKE '${TARGET_DATE}_%';`; }
function checkStarters(){ return `SELECT COUNT(*) AS starters_today FROM starters_current WHERE game_id LIKE '${TARGET_DATE}_%';`; }
function checkTeams(){ return `SELECT COUNT(*) AS teams FROM teams_current;`; }

function listGames(){ return `SELECT game_id FROM games WHERE game_date = '${TARGET_DATE}' ORDER BY game_id;`; }
function listStarters(){ return `SELECT game_id, team_id, starter_name, era, whip, strikeouts, innings_pitched, source FROM starters_current WHERE game_id LIKE '${TARGET_DATE}_%' ORDER BY game_id, team_id;`; }
function badStarters(){ return `SELECT game_id, team_id, starter_name, era, whip, strikeouts, innings_pitched, source FROM starters_current WHERE game_id LIKE '${TARGET_DATE}_%' AND (starter_name LIKE '%Ace%' OR starter_name IN ('TBD','TBA','Unknown','Starter') OR era IS NULL OR era <= 0 OR whip IS NULL OR whip <= 0 OR strikeouts IS NULL OR strikeouts <= 0 OR innings_pitched IS NULL OR innings_pitched <= 0) ORDER BY game_id, team_id;`; }
function latestTasks(){ return `SELECT task_id, job_name, status, started_at, finished_at, output_json, error FROM task_runs ORDER BY started_at DESC LIMIT 8;`; }

function truthAudit(){
  return `
SELECT 'MISSING_STARTER' AS audit_type, g.game_id AS game_id, COUNT(s.team_id) AS starters_found, GROUP_CONCAT(s.team_id) AS teams_found
FROM games g
LEFT JOIN starters_current s ON g.game_id = s.game_id
WHERE g.game_date = '${TARGET_DATE}'
GROUP BY g.game_id
HAVING starters_found < 2;

SELECT 'STAT_OUTLIER' AS audit_type, game_id, team_id, starter_name, era, whip, strikeouts, innings_pitched
FROM starters_current
WHERE game_id LIKE '${TARGET_DATE}_%'
  AND (strikeouts > 300 OR innings_pitched > 220 OR era > 10 OR whip > 2)
ORDER BY game_id;

SELECT 'DUPLICATE_STARTER_NAME' AS audit_type, starter_name, COUNT(*) AS occurrences
FROM starters_current
WHERE game_id LIKE '${TARGET_DATE}_%'
GROUP BY starter_name
HAVING occurrences > 1;

SELECT 'TEAM_NOT_IN_GAME' AS audit_type, s.game_id, s.team_id, s.starter_name
FROM starters_current s
JOIN games g ON s.game_id = g.game_id
WHERE g.game_date = '${TARGET_DATE}'
  AND s.team_id NOT IN (g.away_team, g.home_team)
ORDER BY s.game_id, s.team_id;
`;
}
</script>
</body>
</html>

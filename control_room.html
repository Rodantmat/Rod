<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlphaDog Control Room</title>
<style>
  body{background:#0b0f14;color:#00ff88;font-family:monospace;padding:10px;margin:0}
  h2{margin:8px 0 12px;font-size:22px}
  h3{margin:12px 0 6px;color:#fff;font-size:14px}
  .section{border-top:1px solid #30363d;padding-top:8px;margin-top:10px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  button{padding:9px 4px;font-size:12px;border:none;border-radius:7px;background:#1f6feb;color:white}
  .clean{background:#da3633}
  .check{background:#238636}
  .sql{background:#d29922}
  .debug{background:#8957e5}
  .copy{background:#8957e5;width:100%;margin-top:6px}
  textarea{width:100%;height:90px;margin-top:8px;background:#111;color:#00ff88;padding:8px;border:1px solid #30363d;border-radius:6px;box-sizing:border-box}
  pre{background:#000;color:#00ff88;padding:8px;margin-top:8px;overflow:auto;max-height:260px;min-height:80px;border:1px solid #30363d;border-radius:6px;white-space:pre-wrap;word-break:break-word}
  .status{background:#111;color:#fff;padding:8px;border-radius:6px;border:1px solid #30363d;margin:8px 0}
  .warn{color:#ffcc00}
</style>
</head>
<body>

<h2>ALPHADOG CONTROL ROOM</h2>

<div class="status" id="status">READY</div>

<div class="section">
<h3>DEBUG</h3>
<div class="grid">
<button class="debug" onclick="debugConfig()">Config</button>
<button class="debug" onclick="health()">Health</button>
<button class="debug" onclick="testSQL()">SQL Test</button>
<button class="debug" onclick="clearOutput()">Clear</button>
</div>
</div>

<div class="section">
<h3>SCRAPE</h3>
<div class="grid">
<button onclick="runJob('scrape_games_markets')">Markets</button>
<button onclick="runJob('scrape_starters_group_1')">G1</button>
<button onclick="runJob('scrape_starters_group_2')">G2</button>
<button onclick="runJob('scrape_starters_group_3')">G3</button>
<button onclick="runJob('scrape_teams')">Teams</button>
<button onclick="runJob('scrape_bullpens')">Bullpen</button>
<button onclick="runJob('scrape_lineups')">Lineups</button>
<button onclick="runJob('scrape_players')">Players</button>
</div>
</div>

<div class="section">
<h3>CLEAN</h3>
<div class="grid">
<button class="clean" onclick="runSQL(cleanAll)">Full</button>
<button class="clean" onclick="runSQL(cleanStarters)">Starters</button>
<button class="clean" onclick="runSQL(cleanMarkets)">Markets</button>
<button class="clean" onclick="runSQL(cleanGames)">Games</button>
</div>
</div>

<div class="section">
<h3>CHECK</h3>
<div class="grid">
<button class="check" onclick="runSQL(checkGames)">Games</button>
<button class="check" onclick="runSQL(checkMarkets)">Markets</button>
<button class="check" onclick="runSQL(checkStarters)">Starters</button>
<button class="check" onclick="runSQL(checkTeams)">Teams</button>
<button class="check" onclick="runSQL(listGames)">Game List</button>
<button class="check" onclick="runSQL(listStarters)">Starter List</button>
<button class="check" onclick="runSQL(latestTasks)">Tasks</button>
<button class="check" onclick="runSQL(runningTasks)">Running</button>
</div>
</div>

<div class="section">
<h3>MANUAL SQL</h3>
<textarea id="sql">SELECT COUNT(*) AS games FROM games;</textarea>
<button class="sql" onclick="runSQL()">Run SQL</button>
</div>

<pre id="output">Output will appear here.</pre>
<button class="copy" onclick="copyOutput()">COPY OUTPUT</button>

<script>
const BASE = "https://prop-ingestion-git.rodolfoaamattos.workers.dev";
const JOB_URL = BASE + "/tasks/run";
const SQL_URL = BASE + "/debug/sql";
const HEALTH_URL = BASE + "/health";
const TOKEN = "LindaMaria123@";

function setStatus(msg){ document.getElementById("status").textContent = msg; }
function setOutput(obj){
  const text = typeof obj === "string" ? obj : JSON.stringify(obj,null,2);
  document.getElementById("output").textContent = text;
  window.scrollTo(0, document.body.scrollHeight);
}
function clearOutput(){ setStatus("READY"); setOutput("Output cleared."); }
function debugConfig(){
  setOutput({
    base: BASE,
    job_url: JOB_URL,
    sql_url: SQL_URL,
    token_set: TOKEN !== "PUT_YOUR_TOKEN_HERE",
    note: "If token_set is false, edit TOKEN first. If requests fail with Failed to fetch, Worker needs CORS headers."
  });
}
async function requestJSON(url, payload){
  const headers = {"Content-Type":"application/json","x-ingest-token":TOKEN};
  const options = payload === null ? {method:"GET",headers} : {method:"POST",headers,body:JSON.stringify(payload)};
  try{
    setStatus("RUNNING...");
    const res = await fetch(url, options);
    const text = await res.text();
    setStatus("DONE HTTP " + res.status);
    try { return {http_status:res.status, body:JSON.parse(text)}; }
    catch(e){ return {http_status:res.status, raw:text}; }
  } catch(err){
    setStatus("ERROR");
    return {
      ok:false,
      error:String(err),
      likely_cause:"Browser fetch failed. Most likely CORS is missing on the Worker OR the URL/token is wrong.",
      next:"Send this output to ChatGPT."
    };
  }
}
async function health(){ setOutput(await requestJSON(HEALTH_URL, null)); }
async function runJob(job){ setOutput(await requestJSON(JOB_URL, {job})); }
async function runSQL(sqlOverride){
  const sql = sqlOverride || document.getElementById("sql").value;
  setOutput(await requestJSON(SQL_URL, {sql}));
}
async function testSQL(){ setOutput(await requestJSON(SQL_URL, {sql:"SELECT COUNT(*) AS games FROM games;"})); }
function copyOutput(){ navigator.clipboard.writeText(document.getElementById("output").textContent); setStatus("COPIED"); }

const cleanAll = `
DELETE FROM starters_current WHERE game_id LIKE '2026-04-24_%';
DELETE FROM bullpens_current WHERE game_id LIKE '2026-04-24_%';
DELETE FROM lineups_current WHERE game_id LIKE '2026-04-24_%';
DELETE FROM markets_current WHERE game_id LIKE '2026-04-24_%';
DELETE FROM games WHERE game_date = '2026-04-24';
`;

const cleanStarters = `DELETE FROM starters_current WHERE game_id LIKE '2026-04-24_%';`;
const cleanMarkets = `DELETE FROM markets_current WHERE game_id LIKE '2026-04-24_%';`;
const cleanGames = `DELETE FROM games WHERE game_date = '2026-04-24';`;

const checkGames = `SELECT COUNT(*) AS games FROM games WHERE game_date = '2026-04-24';`;
const checkMarkets = `SELECT COUNT(*) AS markets FROM markets_current WHERE game_id LIKE '2026-04-24_%';`;
const checkStarters = `SELECT COUNT(*) AS starters FROM starters_current WHERE game_id LIKE '2026-04-24_%';`;
const checkTeams = `SELECT COUNT(*) AS teams FROM teams_current;`;

const listGames = `SELECT game_id FROM games WHERE game_date = '2026-04-24' ORDER BY game_id;`;
const listStarters = `SELECT game_id, team_id, starter_name, era, whip, strikeouts, innings_pitched, source FROM starters_current WHERE game_id LIKE '2026-04-24_%' ORDER BY game_id, team_id;`;
const latestTasks = `SELECT task_id, job_name, status, started_at, finished_at, output_json, error FROM task_runs ORDER BY started_at DESC LIMIT 8;`;
const runningTasks = `SELECT COUNT(*) AS running FROM task_runs WHERE status='running';`;
</script>

</body>
</html>

it" onclick="runRfiRegressionSuite()">RFI Regression x3</button><button class="audit" onclick="runSQLButton('CHECK > Player Hydration', playerHydrationAudit())">Player Hydration</button><button class="audit" onclick="runSQLButton('CHECK > Lineup Freshness', lineupFreshness())">Lineup Freshness</button><button class="audit" onclick="runSQLButton('CHECK > Player Cleanliness', playerCleanliness())">Player Cleanliness</button>

<script>
const BASE="https://prop-ingestion-git.rodolfoaamattos.workers.dev", JOB_URL=BASE+"/tasks/run", SQL_URL=BASE+"/debug/sql", INSPECT_URL=BASE+"/board/factor-results/inspect", HEALTH_URL=BASE+"/health", DAILY_HEALTH_URL=BASE+"/health/daily", CONFIG_URL="https://raw.githubusercontent.com/Rodantmat/Rod/main/config.txt";
let TOKEN="", CONFIG_LOADED=false, SLATE_MODE=localStorage.getItem("alphadog_slate_mode")||"AUTO", MANUAL_DATE=localStorage.getItem("alphadog_manual_date")||"";
function pad2(n){return String(n).padStart(2,"0")}
function addDaysISO(s,d){const p=s.split("-").map(Number),x=new Date(Date.UTC(p[0],p[1]-1,p[2]));x.setUTCDate(x.getUTCDate()+d);return x.getUTCFullYear()+"-"+pad2(x.getUTCMonth()+1)+"-"+pad2(x.getUTCDate())}
function ptParts(){const parts=new Intl.DateTimeFormat("en-CA",{timeZone:"America/Los_Angeles",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).formatToParts(new Date()),m={};parts.forEach(p=>m[p.type]=p.value);return {date:m.year+"-"+m.month+"-"+m.day,hour:Number(m.hour),time:m.hour+":"+m.minute+":"+m.second}}
function resolveSlateDate(){const p=ptParts();if(SLATE_MODE==="MANUAL"&&/^\d{4}-\d{2}-\d{2}$/.test(MANUAL_DATE))return MANUAL_DATE;if(SLATE_MODE==="TODAY")return p.date;if(SLATE_MODE==="TOMORROW")return addDaysISO(p.date,1);return p.hour>=20?addDaysISO(p.date,1):p.date}
function updateSlateLabels(){const p=ptParts();document.getElementById("ptNowLabel").textContent=p.date+" "+p.time;document.getElementById("slateModeLabel").textContent=SLATE_MODE;document.getElementById("targetDateLabel").textContent=resolveSlateDate();document.getElementById("manualDate").value=MANUAL_DATE;}
function setSlateMode(m){SLATE_MODE=m;localStorage.setItem("alphadog_slate_mode",m);updateSlateLabels();setOutput("Slate Mode",{slate_mode:SLATE_MODE,resolved_slate:resolveSlateDate()})}
function setManualDate(v){MANUAL_DATE=String(v||"").trim();localStorage.setItem("alphadog_manual_date",MANUAL_DATE);updateSlateLabels()}
function setStatus(m){document.getElementById("status").textContent="["+new Date().toLocaleTimeString()+"] "+m}
function setOutput(l,o){document.getElementById("output").textContent="ACTION: "+l+"\nTIME: "+new Date().toISOString()+"\n\n"+(typeof o==="string"?o:JSON.stringify(o,null,2));window.scrollTo(0,document.body.scrollHeight)}
function loading(l,e){setStatus("RUNNING: "+l);setOutput(l,"Loading..."+(e?"\n"+e:""))}
function tokenFingerprint(){return TOKEN?{loaded:true,length:TOKEN.length,starts_with:TOKEN.slice(0,2),ends_with:TOKEN.slice(-2)}:{loaded:false,length:0}}
async function loadConfig(){try{loading("Reload Config");const r=await fetch(CONFIG_URL+"?t="+Date.now(),{cache:"no-store"}),t=await r.text(),m=t.match(/^\s*TOKEN\s*=\s*(.+?)\s*$/m);if(m&&m[1].trim()){TOKEN=m[1].trim().replace(/^["']|["']$/g,"");CONFIG_LOADED=true;setStatus("CONFIG LOADED");setOutput("Reload Config",{config_loaded:true,token_fingerprint:tokenFingerprint()})}else{TOKEN="";CONFIG_LOADED=false;setOutput("Reload Config",{config_loaded:false,error:"TOKEN line not found"})}}catch(e){TOKEN="";CONFIG_LOADED=false;setOutput("Reload Config",{config_loaded:false,error:String(e)})}}
function debugConfig(){setOutput("DEBUG > Config",{base:BASE,config_url:CONFIG_URL,slate_mode:SLATE_MODE,manual_date:MANUAL_DATE,resolved_slate:resolveSlateDate(),pt_now:ptParts(),token_set:Boolean(TOKEN),config_loaded:CONFIG_LOADED,token_fingerprint:tokenFingerprint(),version:"control_room_v1_2_48_result_lantern"})}
async function rawRequest(l,u,p){if(!CONFIG_LOADED||!TOKEN)await loadConfig();const h={"Content-Type":"application/json","x-ingest-token":TOKEN},o=p===null?{method:"GET",headers:h}:{method:"POST",headers:h,body:JSON.stringify(p)};try{const r=await fetch(u,o),txt=await r.text();let b;try{b=JSON.parse(txt)}catch(e){b=txt}return {http_status:r.status,body:b}}catch(e){return {ok:false,error:String(e),action:l}}}
async function requestJSON(l,u,p){loading(l);const r=await rawRequest(l,u,p);setStatus("DONE: "+l+" / HTTP "+(r.http_status||"ERR"));setOutput(l,r);return r}
function shouldRetry(r,j){const raw=JSON.stringify(r||{});if(raw.includes("503")||raw.includes("UNAVAILABLE")||raw.includes("high demand")||raw.includes("Load failed")||raw.includes("cancelled"))return true;const ins=r&&r.body&&r.body.inserted;if(ins){const vals=Object.values(ins).map(Number);if(vals.length&&vals.every(v=>v===0)){if(j==="scrape_starters_group_2"||j==="scrape_starters_group_3"||j==="scrape_starters_missing")return false;return true}}return false}
async function requestJobWithRetry(l,j){const a=[],d=resolveSlateDate();for(let i=1;i<=3;i++){loading(l,"Try "+i+" of 3 started.\nSlate: "+d);const r=await rawRequest(l+" try "+i,JOB_URL,{job:j,slate_date:d,slate_mode:SLATE_MODE,manual_slate_date:MANUAL_DATE});a.push({try:i,result:r});if(!shouldRetry(r,j)){
  const isOk = r && r.http_status && r.http_status < 400 && (!r.body || r.body.ok !== false);
  setStatus((isOk ? "DONE: " : "FAILED: ") + l);
  setOutput(l,{final:isOk ? "success" : "failed",slate_date:d,attempts:a});
  return
}if(i<3){setOutput(l,{status:"retrying",reason:"503/cancelled/zero inserted",next_try:i+1,slate_date:d,attempts:a});await new Promise(x=>setTimeout(x,10000))}}setOutput(l,{final:"failed_after_3_attempts",slate_date:d,attempts:a})}
function health(){requestJSON("DEBUG > Health",HEALTH_URL,null)}function dailyHealth(){requestJSON("DEBUG > Daily Health",DAILY_HEALTH_URL+"?slate_date="+encodeURIComponent(D()),null)}function testSQL(){requestJSON("DEBUG > SQL Test",SQL_URL,{sql:""})}function runJobButton(l,j){requestJobWithRetry(l,j)}function runSQLButton(l,s){requestJSON(l,SQL_URL,{sql:s})}function inspectLatestFactorResult(){requestJSON("CHECK > Board Factor Inspect",INSPECT_URL,{slate_date:D(),limit:3,raw_max_chars:20000})}function runManualSQL(){requestJSON("MANUAL SQL > Output",SQL_URL,{sql:document.getElementById("sqlInput").value,max_rows:50,max_chars:900})}function copyOutput(){navigator.clipboard.writeText(document.getElementById("output").textContent);setStatus("COPIED OUTPUT")}
function jobLabelSql(){return `CASE job_name WHEN 'run_full_pipeline' THEN 'SCRAPE > FULL RUN' WHEN 'scheduled_full_pipeline_plus_board_queue' THEN 'SCRAPE > FULL RUN + Board Queue Pipeline' WHEN 'daily_mlb_slate' THEN 'SCRAPE > Markets' WHEN 'scrape_games_markets' THEN 'SCRAPE > Markets' WHEN 'board_sifter_preview' THEN 'SCRAPE > Board Sifter Preview' WHEN 'board_queue_preview' THEN 'SCRAPE > Board Queue Preview' WHEN 'board_queue_build' THEN 'SCRAPE > Board Queue Build' WHEN 'run_board_queue_pipeline' THEN 'SCRAPE > Board Queue Pipeline' WHEN 'board_queue_mine_one' THEN 'SCRAPE > Board Queue Mine One' WHEN 'build_edge_candidates_hits' THEN 'SCRAPE > Build Hits Candidates' WHEN 'build_edge_candidates_rbi' THEN 'SCRAPE > Build RBI Candidates' WHEN 'build_edge_candidates_rfi' THEN 'SCRAPE > Build RFI Candidates' WHEN 'scrape_players_mlb_api_g1' THEN 'SCRAPE > MLB Players G1' WHEN 'scrape_players_mlb_api_g2' THEN 'SCRAPE > MLB Players G2' WHEN 'scrape_players_mlb_api_g3' THEN 'SCRAPE > MLB Players G3' WHEN 'scrape_players_mlb_api_g4' THEN 'SCRAPE > MLB Players G4' WHEN 'scrape_players_mlb_api_g5' THEN 'SCRAPE > MLB Players G5' WHEN 'scrape_players_mlb_api_g6' THEN 'SCRAPE > MLB Players G6' WHEN 'scrape_players_mlb_api' THEN 'SCRAPE > MLB Players' ELSE 'JOB > ' || job_name END`}function D(){return resolveSlateDate()}function cleanAll(){return `DELETE FROM starters_current WHERE game_id LIKE '${D()}_%'; DELETE FROM bullpens_current WHERE game_id LIKE '${D()}_%'; DELETE FROM lineups_current WHERE game_id LIKE '${D()}_%'; DELETE FROM markets_current WHERE game_id LIKE '${D()}_%'; DELETE FROM games WHERE game_date = '${D()}';`}function cleanStarters(){return `DELETE FROM starters_current WHERE game_id LIKE '${D()}_%';`}function cleanMarkets(){return `DELETE FROM markets_current WHERE game_id LIKE '${D()}_%';`}function cleanGames(){return `DELETE FROM games WHERE game_date = '${D()}';`}function checkGames(){return ``}function checkMarkets(){return ``}function checkStarters(){return ``}function activeSlateSize(){return ``}function listGames(){return `SELECT game_id FROM games WHERE game_date = '${D()}' ORDER BY game_id;`}function listStarters(){return `SELECT game_id, team_id, starter_name, era, whip, strikeouts, innings_pitched, source FROM starters_current WHERE game_id LIKE '${D()}_%' ORDER BY game_id, team_id; SELECT 'GENERATED_NAME' AS audit_type, game_id, team_id, starter_name FROM starters_current WHERE game_id LIKE '${D()}_%' AND starter_name IN ('Ethan Miller','Liam Johnson','Miguel Rodriguez','David Chen','Sophia Lee','Noah Williams','Olivia Davis','Lucas Garcia','Daniel Kim','Chloe Brown','Noah Davis','Olivia White','William Brown','Sophia Green','Isabella King','James Taylor','Emily Chen','Michael Lee') ORDER BY game_id, team_id;`}function badStarters(){return `SELECT game_id, team_id, starter_name, era, whip, strikeouts, innings_pitched, source FROM starters_current WHERE game_id LIKE '${D()}_%' AND (starter_name LIKE '%Ace%' OR starter_name IN ('TBD','TBA','Unknown','Starter') OR era IS NULL OR era <= 0 OR whip IS NULL OR whip <= 0 OR strikeouts IS NULL OR strikeouts <= 0 OR innings_pitched IS NULL OR innings_pitched <= 0) ORDER BY game_id, team_id; SELECT 'GENERATED_NAME' AS audit_type, game_id, team_id, starter_name FROM starters_current WHERE game_id LIKE '${D()}_%' AND starter_name IN ('Ethan Miller','Liam Johnson','Miguel Rodriguez','David Chen','Sophia Lee','Noah Williams','Olivia Davis','Lucas Garcia','Daniel Kim','Chloe Brown','Noah Davis','Olivia White','William Brown','Sophia Green','Isabella King','James Taylor','Emily Chen','Michael Lee') ORDER BY game_id, team_id;`}function statsMissing(){return `SELECT game_id, team_id, starter_name, era, whip, strikeouts, innings_pitched, source FROM starters_current WHERE game_id LIKE '${D()}_%' AND (era IS NULL OR era <= 0 OR whip IS NULL OR whip <= 0 OR strikeouts IS NULL OR strikeouts <= 0 OR innings_pitched IS NULL OR innings_pitched <= 0) ORDER BY game_id, team_id;`}function boardFactorResultsAudit(){return `SELECT 'BOARD_FACTOR_RESULTS_EXISTS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 1 THEN 'PASS' ELSE 'RUN_BOARD_QUEUE_MINE_ONE' END AS status FROM sqlite_master WHERE type='table' AND name='board_factor_results'; SELECT slate_date, queue_type, status, COUNT(*) AS rows_count, SUM(factor_count) AS factor_rows, MIN(min_score) AS min_score, MAX(max_score) AS max_score, ROUND(AVG(avg_score),2) AS avg_score FROM board_factor_results GROUP BY slate_date, queue_type, status ORDER BY slate_date DESC, queue_type LIMIT 50; SELECT q.slate_date, q.queue_type, q.status, COUNT(*) AS queue_rows FROM board_factor_queue q GROUP BY q.slate_date, q.queue_type, q.status ORDER BY q.slate_date DESC, q.queue_type, q.status LIMIT 50;`}

    version: "v1.2.40 - Manual SQL Output Guard",
    slate_date: d,
    cycle_count: cycles,
    cycles: [],
    regression: {status:"not_started",mode:"anchored_single_sql_payload",complete:false,outputs:[]},
    pass_notes: [
      "No intermediate JSON rendering during the cycle loop; this prevents browser/output interruption before cycle 3.",
      "Cycle errors are captured into the suite instead of aborting the regression function.",
      "Final regression checks execute after the cycle loop in one anchored SQL payload.",
      "ok=true requires all 3 RFI cycles plus all 12 baseline checks to pass."
    ]
  };

  const compactFailure = (label, err) => ({
    label,
    error:String(err && err.message ? err.message : err),
    stack:String(err && err.stack ? err.stack : "").split("\n").slice(0,3).join(" | ")
  });

  loading("CHECK > RFI Regression x3", "Running no-interrupt deterministic RFI build/audit cycles.\nSlate: " + d);

  try{
    for(let i=1;i<=cycles;i++){
      setStatus("RFI REGRESSION CYCLE " + i + " / " + cycles + " — running");
      const cycle = {
        cycle:i,
        build_http_status:null,
        build_ok:false,
        raw_games:null,
        fetched_rows:null,
        inserted_edge_candidates_rfi:null,
        yes_rfi:null,
        lean_yes:null,
        watchlist_or_no:null,
        warning_rows:null,
        audit_http_status:null,
        audit_ok:false,
        audit_tier_counts:{},
        audit_warning_rows:null,
        audit_missing_starters:null,
        audit_incomplete_yes_leak:null,
        cycle_error:null
      };

      try{
        const build = await rawRequest("CHECK > RFI Regression Build " + i, JOB_URL, {job:"build_edge_candidates_rfi",slate_date:d,slate_mode:SLATE_MODE,manual_slate_date:MANUAL_DATE});
        const body = build && build.body ? build.body : {};
        const inserted = body.inserted && body.inserted.edge_candidates_rfi != null ? Number(body.inserted.edge_candidates_rfi) : null;
        cycle.build_http_status = build && build.http_status ? build.http_status : null;
        cycle.build_ok = !!body.ok;
        cycle.raw_games = Number(body.raw_games??0);
        cycle.fetched_rows = Number(body.fetched_rows??0);
        cycle.inserted_edge_candidates_rfi = inserted;
        cycle.yes_rfi = Number(body.yes_rfi??0);
        cycle.lean_yes = Number(body.lean_yes??0);
        cycle.watchlist_or_no = Number(body.watchlist_or_no??0);
        cycle.warning_rows = Array.isArray(body.warnings)?body.warnings.length:null;

        const audit = await rawRequest("CHECK > RFI Regression Audit " + i, SQL_URL, {sql:rfiCandidatesAudit()});
        const auditOutputs = audit && audit.body && Array.isArray(audit.body.outputs) ? audit.body.outputs : [];
        const tierRows = auditOutputs[1] && Array.isArray(auditOutputs[1].rows) ? auditOutputs[1].rows : [];
        const warningRow = auditOutputs[3] && Array.isArray(auditOutputs[3].rows) && auditOutputs[3].rows[0] ? auditOutputs[3].rows[0] : null;
        const missingStarterRow = auditOutputs[2] && Array.isArray(auditOutputs[2].rows) && auditOutputs[2].rows[0] ? auditOutputs[2].rows[0] : null;
        const yesLeakRow = auditOutputs[6] && Array.isArray(auditOutputs[6].rows) && auditOutputs[6].rows[0] ? auditOutputs[6].rows[0] : null;
        const tierCounts = {};
        tierRows.forEach(r => { tierCounts[r.candidate_tier] = Number(r.count_value); });
        cycle.audit_http_status = audit && audit.http_status ? audit.http_status : null;
        cycle.audit_ok = !!(audit && audit.body && audit.body.ok);
        cycle.audit_tier_counts = tierCounts;
        cycle.audit_warning_rows = warningRow ? Number(warningRow.count_value) : null;
        cycle.audit_missing_starters = missingStarterRow ? Number(missingStarterRow.count_value) : null;
        cycle.audit_incomplete_yes_leak = yesLeakRow ? Number(yesLeakRow.count_value) : null;
      }catch(cycleErr){
        cycle.cycle_error = compactFailure("cycle_" + i, cycleErr);
      }

      suite.cycles.push(cycle);
      setStatus("RFI REGRESSION CYCLE " + i + " / " + cycles + " — captured");
    }

    const checks = [
      {check:"RFI_TOTAL", sql:`SELECT 'RFI_TOTAL' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 15 THEN 'PASS_EXPECTED_15' WHEN COUNT(*) > 0 THEN 'WARN_COUNT_REVIEW' ELSE 'FAIL_EMPTY' END AS status FROM edge_candidates_rfi WHERE slate_date = '${d}'`, expect:"PASS_EXPECTED_15"},
      {check:"RFI_WARNINGS", sql:`SELECT 'RFI_WARNINGS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) <= 3 THEN 'PASS_EXPECTED_OR_BETTER' ELSE 'WARN_MORE_THAN_BASELINE' END AS status FROM edge_candidates_rfi WHERE slate_date = '${d}' AND candidate_reason LIKE '%warn_%'`, expect:"PASS_EXPECTED_OR_BETTER"},
      {check:"RFI_CAP_CRITICAL_ROWS", sql:`SELECT 'RFI_CAP_CRITICAL_ROWS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 1 THEN 'PASS_BASELINE_1' ELSE 'WARN_REVIEW' END AS status FROM edge_candidates_rfi WHERE slate_date = '${d}' AND candidate_reason LIKE '%cap_critical_data_missing%'`, expect:"PASS_BASELINE_1"},
      {check:"RFI_CAP_PARTIAL_ROWS", sql:`SELECT 'RFI_CAP_PARTIAL_ROWS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 2 THEN 'PASS_BASELINE_2' ELSE 'WARN_REVIEW' END AS status FROM edge_candidates_rfi WHERE slate_date = '${d}' AND candidate_reason LIKE '%cap_partial_data_missing%'`, expect:"PASS_BASELINE_2"},
      {check:"RFI_INCOMPLETE_YES_LEAK", sql:`SELECT 'RFI_INCOMPLETE_YES_LEAK' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS_NO_LEAK' ELSE 'FAIL_REVIEW' END AS status FROM edge_candidates_rfi WHERE slate_date = '${d}' AND candidate_tier = 'YES_RFI' AND (candidate_reason LIKE '%warn_away_top3_lineup_incomplete%' OR candidate_reason LIKE '%warn_home_top3_lineup_incomplete%')`, expect:"PASS_NO_LEAK"},
      {check:"RBI_TOTAL", sql:`SELECT 'RBI_TOTAL' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 119 THEN 'PASS_BASELINE_119' ELSE 'FAIL_BASELINE_DRIFT' END AS status FROM edge_candidates_rbi`, expect:"PASS_BASELINE_119"},
      {check:"RBI_TIER_SPLIT", sql:`SELECT GROUP_CONCAT(candidate_tier || ' ' || count_value, ' / ') AS tier_split, CASE WHEN SUM(CASE WHEN candidate_tier = 'A_POOL' THEN count_value ELSE 0 END) = 55 AND SUM(CASE WHEN candidate_tier = 'B_POOL' THEN count_value ELSE 0 END) = 64 THEN 'PASS_BASELINE_55_64' ELSE 'FAIL_TIER_DRIFT' END AS status FROM (SELECT candidate_tier, COUNT(*) AS count_value FROM edge_candidates_rbi GROUP BY candidate_tier)`, expect:"PASS_BASELINE_55_64"},
      {check:"RBI_WEAK_A_POOL_LEAK", sql:`SELECT 'RBI_WEAK_A_POOL_LEAK' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS_NO_LEAK' ELSE 'FAIL_REVIEW' END AS status FROM edge_candidates_rbi WHERE candidate_tier = 'A_POOL' AND rbi_opportunity_score <= 2`, expect:"PASS_NO_LEAK"},
      {check:"HITS_TOTAL", sql:`SELECT 'HITS_TOTAL' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) > 0 THEN 'PASS_NON_EMPTY' ELSE 'FAIL_EMPTY' END AS status FROM edge_candidates_hits`, expect:"PASS_NON_EMPTY"},
      {check:"PLAYERS_CURRENT", sql:`SELECT 'PLAYERS_CURRENT' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) >= 760 THEN 'PASS' ELSE 'WARN_REVIEW' END AS status FROM players_current`, expect:"PASS"},
      {check:"STARTERS_TODAY", sql:`SELECT 'STARTERS_TODAY' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 30 THEN 'PASS' ELSE 'WARN_REVIEW' END AS status FROM starters_current WHERE game_id LIKE '${d}_%'`, expect:"PASS"},
      {check:"LINEUPS_TODAY", sql:`SELECT 'LINEUPS_TODAY' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) >= 200 THEN 'PASS' ELSE 'WARN_REVIEW' END AS status FROM lineups_current WHERE game_id LIKE '${d}_%'`, expect:"PASS"}
    ];

    setStatus("RFI REGRESSION FINAL CHECKS — running anchored payload");
    suite.regression = {status:"running",mode:"anchored_single_sql_payload",complete:false,outputs:[]};

    const regressionSql = checks.map(c => c.sql.trim().replace(/;+$/g, "") + ";").join("\n");
    const regressionResponse = await rawRequest("CHECK > RFI Regression Final Baselines", SQL_URL, {sql:regressionSql});
    const rawOutputs = regressionResponse && regressionResponse.body && Array.isArray(regressionResponse.body.outputs) ? regressionResponse.body.outputs : [];
    const outputs = checks.map((item, idx) => {
      const raw = rawOutputs[idx] || null;
      const rows = raw && Array.isArray(raw.rows) ? raw.rows : [];
      const result = rows.length === 1 ? rows[0] : rows;
      const status = rows.length === 1 ? String(rows[0].status || "") : "";
      return {
        check:item.check,
        sql:item.sql,
        result,
        status,
        expected_status:item.expect,
        pass:status===item.expect,
        http_status:regressionResponse?regressionResponse.http_status:null,
        ok:!!(regressionResponse&&regressionResponse.http_status===200&&regressionResponse.body&&regressionResponse.body.ok&&raw)
      };
    });

    const cycleOk = suite.cycles.length === cycles && suite.cycles.every(c => c.build_ok && c.audit_ok && c.raw_games === 15 && c.fetched_rows === 15 && c.inserted_edge_candidates_rfi === 15 && c.yes_rfi === 7 && c.lean_yes === 4 && c.watchlist_or_no === 4 && c.warning_rows === 3 && c.audit_tier_counts.YES_RFI === 7 && c.audit_tier_counts.LEAN_YES === 4 && c.audit_tier_counts.WATCHLIST === 4 && c.audit_warning_rows === 3 && c.audit_missing_starters === 0 && c.audit_incomplete_yes_leak === 0);
    const regressionOk = outputs.length === checks.length && rawOutputs.length === checks.length && outputs.every(o => o.ok && o.pass);
    suite.regression = {
      status:regressionOk ? "pass" : "review",
      mode:"anchored_single_sql_payload",
      complete:regressionOk,
      expected_checks:checks.length,
      returned_checks:rawOutputs.length,
      outputs
    };
    suite.ok = cycleOk && regressionOk;
    suite.final = suite.ok ? "pass" : "review";
    suite.candidate_summary = {YES_RFI:7, LEAN_YES:4, WATCHLIST:4};
  }catch(err){
    suite.ok = false;
    suite.final = "error";
    suite.regression = suite.regression || {status:"not_started",mode:"anchored_single_sql_payload",complete:false,outputs:[]};
    suite.fatal_error = compactFailure("runRfiRegressionSuite", err);
  }

  setStatus((suite.ok ? "DONE: " : "REVIEW: ") + "CHECK > RFI Regression x3");
  setOutput("CHECK > RFI Regression x3", suite);
}


function rfiCandidatesAudit(){return `
SELECT 'RFI_CANDIDATES_TOTAL' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) > 0 THEN 'PASS' ELSE 'WARN_EMPTY' END AS status
FROM edge_candidates_rfi WHERE slate_date='${D()}';

SELECT candidate_tier, COUNT(*) AS count_value
FROM edge_candidates_rfi
WHERE slate_date='${D()}'
GROUP BY candidate_tier
ORDER BY candidate_tier;

SELECT 'RFI_MISSING_STARTERS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS' ELSE 'WARN_REVIEW' END AS status
FROM edge_candidates_rfi
WHERE slate_date='${D()}'
  AND (away_starter IS NULL OR home_starter IS NULL OR away_starter = '' OR home_starter = '');

SELECT 'RFI_WARNING_ROWS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS_CLEAN' ELSE 'WARN_REVIEW' END AS status
FROM edge_candidates_rfi
WHERE slate_date='${D()}'
  AND candidate_reason LIKE '%warn_%';

SELECT 'RFI_CAP_CRITICAL_ROWS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS_NONE' WHEN COUNT(*) = 1 THEN 'PASS_BASELINE_1' ELSE 'WARN_REVIEW' END AS status
FROM edge_candidates_rfi
WHERE slate_date='${D()}'
  AND candidate_reason LIKE '%cap_critical_data_missing%';

SELECT 'RFI_CAP_PARTIAL_ROWS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) <= 2 THEN 'PASS_EXPECTED_OR_BETTER' ELSE 'WARN_REVIEW' END AS status
FROM edge_candidates_rfi
WHERE slate_date='${D()}'
  AND candidate_reason LIKE '%cap_partial_data_missing%';

SELECT 'RFI_INCOMPLETE_YES_LEAK' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS_NO_LEAK' ELSE 'FAIL_REVIEW' END AS status
FROM edge_candidates_rfi
WHERE slate_date='${D()}'
  AND candidate_tier = 'YES_RFI'
  AND (candidate_reason LIKE '%warn_away_top3_lineup_incomplete%' OR candidate_reason LIKE '%warn_home_top3_lineup_incomplete%');

SELECT 'RFI_CRITICAL_CAP_LEAK' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS_NO_LEAK' ELSE 'FAIL_REVIEW' END AS status
FROM edge_candidates_rfi
WHERE slate_date='${D()}'
  AND candidate_reason LIKE '%cap_critical_data_missing%'
  AND candidate_tier IN ('YES_RFI','LEAN_YES');

SELECT candidate_tier, COUNT(*) AS rows_count, MIN(rfi_score) AS min_score, MAX(rfi_score) AS max_score, AVG(rfi_score) AS avg_score
FROM edge_candidates_rfi
WHERE slate_date='${D()}'
GROUP BY candidate_tier
ORDER BY MAX(rfi_score) DESC;

SELECT game_id, away_team, home_team, away_starter, home_starter, rfi_score, candidate_tier, candidate_reason
FROM edge_candidates_rfi
WHERE slate_date='${D()}'
ORDER BY rfi_score DESC
LIMIT 20;
`}

</script>

<script>
function clearSqlInput(){
  const el = document.getElementById('sqlInput') || document.querySelector('textarea');
  if (!el) return;
  el.removeAttribute('readonly');
  el.removeAttribute('disabled');
  el.value = '';
  el.focus();
}
function selectSqlInput(){
  const el = document.getElementById('sqlInput') || document.querySelector('textarea');
  if (!el) return;
  el.removeAttribute('readonly');
  el.removeAttribute('disabled');
  el.focus();
  el.select();
}
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('sqlInput') || document.querySelector('textarea');
  if (el) {
    el.removeAttribute('readonly');
    el.removeAttribute('disabled');
    el.style.userSelect = 'text';
    el.style.webkitUserSelect = 'text';
    el.style.pointerEvents = 'auto';
  }
});
</script>

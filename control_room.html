ayer Cleanliness', playerCleanliness())">Player Cleanliness</button>

<script>
const BASE="https://prop-ingestion-git.rodolfoaamattos.workers.dev", JOB_URL=BASE+"/tasks/run", SQL_URL=BASE+"/debug/sql", HEALTH_URL=BASE+"/health", CONFIG_URL="https://raw.githubusercontent.com/Rodantmat/Rod/main/config.txt";
let TOKEN="", CONFIG_LOADED=false, SLATE_MODE=localStorage.getItem("alphadog_slate_mode")||"AUTO", MANUAL_DATE=localStorage.getItem("alphadog_manual_date")||"";
function pad2(n){return String(n).padStart(2,"0")}
function addDaysISO(s,d){const p=s.split("-").map(Number),x=new Date(Date.UTC(p[0],p[1]-1,p[2]));x.setUTCDate(x.getUTCDate()+d);return x.getUTCFullYear()+"-"+pad2(x.getUTCMonth()+1)+"-"+pad2(x.getUTCDate())}
function ptParts(){const parts=new Intl.DateTimeFormat("en-CA",{timeZone:"America/Los_Angeles",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).formatToParts(new Date()),m={};parts.forEach(p=>m[p.type]=p.value);return {date:m.year+"-"+m.month+"-"+m.day,hour:Number(m.hour),time:m.hour+":"+m.minute+":"+m.second}}
function resolveSlateDate(){const p=ptParts();if(SLATE_MODE==="MANUAL"&&/^\d{4}-\d{2}-\d{2}$/.test(MANUAL_DATE))return MANUAL_DATE;if(SLATE_MODE==="TODAY")return p.date;if(SLATE_MODE==="TOMORROW")return addDaysISO(p.date,1);return p.hour>=20?addDaysISO(p.date,1):p.date}
function updateSlateLabels(){const p=ptParts();document.getElementById("ptNowLabel").textContent=p.date+" "+p.time;document.getElementById("slateModeLabel").textContent=SLATE_MODE;document.getElementById("targetDateLabel").textContent=resolveSlateDate();document.getElementById("manualDate").value=MANUAL_DATE;document.getElementById("sqlInput").value=""}
function setSlateMode(m){SLATE_MODE=m;localStorage.setItem("alphadog_slate_mode",m);updateSlateLabels();setOutput("Slate Mode",{slate_mode:SLATE_MODE,resolved_slate:resolveSlateDate()})}
function setManualDate(v){MANUAL_DATE=String(v||"").trim();localStorage.setItem("alphadog_manual_date",MANUAL_DATE);updateSlateLabels()}
function setStatus(m){document.getElementById("status").textContent="["+new Date().toLocaleTimeString()+"] "+m}
function setOutput(l,o){document.getElementById("output").textContent="ACTION: "+l+"\nTIME: "+new Date().toISOString()+"\n\n"+(typeof o==="string"?o:JSON.stringify(o,null,2));window.scrollTo(0,document.body.scrollHeight)}
function loading(l,e){setStatus("RUNNING: "+l);setOutput(l,"Loading..."+(e?"\n"+e:""))}
function tokenFingerprint(){return TOKEN?{loaded:true,length:TOKEN.length,starts_with:TOKEN.slice(0,2),ends_with:TOKEN.slice(-2)}:{loaded:false,length:0}}
async function loadConfig(){try{loading("Reload Config");const r=await fetch(CONFIG_URL+"?t="+Date.now(),{cache:"no-store"}),t=await r.text(),m=t.match(/^\s*TOKEN\s*=\s*(.+?)\s*$/m);if(m&&m[1].trim()){TOKEN=m[1].trim().replace(/^["']|["']$/g,"");CONFIG_LOADED=true;setStatus("CONFIG LOADED");setOutput("Reload Config",{config_loaded:true,token_fingerprint:tokenFingerprint()})}else{TOKEN="";CONFIG_LOADED=false;setOutput("Reload Config",{config_loaded:false,error:"TOKEN line not found"})}}catch(e){TOKEN="";CONFIG_LOADED=false;setOutput("Reload Config",{config_loaded:false,error:String(e)})}}
function debugConfig(){setOutput("Config",{base:BASE,config_url:CONFIG_URL,slate_mode:SLATE_MODE,manual_date:MANUAL_DATE,resolved_slate:resolveSlateDate(),pt_now:ptParts(),token_set:Boolean(TOKEN),config_loaded:CONFIG_LOADED,token_fingerprint:tokenFingerprint(),version:"control_room_derived_context_manual_safe_safe_player_identity_2026_04_25"})}
async function rawRequest(l,u,p){if(!CONFIG_LOADED||!TOKEN)await loadConfig();const h={"Content-Type":"application/json","x-ingest-token":TOKEN},o=p===null?{method:"GET",headers:h}:{method:"POST",headers:h,body:JSON.stringify(p)};try{const r=await fetch(u,o),txt=await r.text();let b;try{b=JSON.parse(txt)}catch(e){b=txt}return {http_status:r.status,body:b}}catch(e){return {ok:false,error:String(e),action:l}}}
async function requestJSON(l,u,p){loading(l);const r=await rawRequest(l,u,p);setStatus("DONE: "+l+" / HTTP "+(r.http_status||"ERR"));setOutput(l,r);return r}
function shouldRetry(r,j){const raw=JSON.stringify(r||{});if(raw.includes("503")||raw.includes("UNAVAILABLE")||raw.includes("high demand")||raw.includes("Load failed")||raw.includes("cancelled"))return true;const ins=r&&r.body&&r.body.inserted;if(ins){const vals=Object.values(ins).map(Number);if(vals.length&&vals.every(v=>v===0)){if(j==="scrape_starters_group_2"||j==="scrape_starters_group_3"||j==="scrape_starters_missing")return false;return true}}return false}
async function requestJobWithRetry(l,j){const a=[],d=resolveSlateDate();for(let i=1;i<=3;i++){loading(l,"Try "+i+" of 3 started.\nSlate: "+d);const r=await rawRequest(l+" try "+i,JOB_URL,{job:j,slate_date:d,slate_mode:SLATE_MODE,manual_slate_date:MANUAL_DATE});a.push({try:i,result:r});if(!shouldRetry(r,j)){
  const isOk = r && r.http_status && r.http_status < 400 && (!r.body || r.body.ok !== false);
  setStatus((isOk ? "DONE: " : "FAILED: ") + l);
  setOutput(l,{final:isOk ? "success" : "failed",slate_date:d,attempts:a});
  return
}if(i<3){setOutput(l,{status:"retrying",reason:"503/cancelled/zero inserted",next_try:i+1,slate_date:d,attempts:a});await new Promise(x=>setTimeout(x,10000))}}setOutput(l,{final:"failed_after_3_attempts",slate_date:d,attempts:a})}
function health(){requestJSON("Health",HEALTH_URL,null)}function testSQL(){requestJSON("SQL Test",SQL_URL,{sql:""})}function runJobButton(l,j){requestJobWithRetry(l,j)}function runSQLButton(l,s){requestJSON(l,SQL_URL,{sql:s})}function runManualSQL(){runSQLButton("Manual SQL",document.getElementById("sqlInput").value)}function copyOutput(){navigator.clipboard.writeText(document.getElementById("output").textContent);setStatus("COPIED OUTPUT")}
function D(){return resolveSlateDate()}function cleanAll(){return `DELETE FROM starters_current WHERE game_id LIKE '${D()}_%'; DELETE FROM bullpens_current WHERE game_id LIKE '${D()}_%'; DELETE FROM lineups_current WHERE game_id LIKE '${D()}_%'; DELETE FROM markets_current WHERE game_id LIKE '${D()}_%'; DELETE FROM games WHERE game_date = '${D()}';`}function cleanStarters(){return `DELETE FROM starters_current WHERE game_id LIKE '${D()}_%';`}function cleanMarkets(){return `DELETE FROM markets_current WHERE game_id LIKE '${D()}_%';`}function cleanGames(){return `DELETE FROM games WHERE game_date = '${D()}';`}function checkGames(){return ``}function checkMarkets(){return ``}function checkStarters(){return ``}function activeSlateSize(){return ``}function listGames(){return `SELECT game_id FROM games WHERE game_date = '${D()}' ORDER BY game_id;`}function listStarters(){return `SELECT game_id, team_id, starter_name, era, whip, strikeouts, innings_pitched, source FROM starters_current WHERE game_id LIKE '${D()}_%' ORDER BY game_id, team_id; SELECT 'GENERATED_NAME' AS audit_type, game_id, team_id, starter_name FROM starters_current WHERE game_id LIKE '${D()}_%' AND starter_name IN ('Ethan Miller','Liam Johnson','Miguel Rodriguez','David Chen','Sophia Lee','Noah Williams','Olivia Davis','Lucas Garcia','Daniel Kim','Chloe Brown','Noah Davis','Olivia White','William Brown','Sophia Green','Isabella King','James Taylor','Emily Chen','Michael Lee') ORDER BY game_id, team_id;`}function badStarters(){return `SELECT game_id, team_id, starter_name, era, whip, strikeouts, innings_pitched, source FROM starters_current WHERE game_id LIKE '${D()}_%' AND (starter_name LIKE '%Ace%' OR starter_name IN ('TBD','TBA','Unknown','Starter') OR era IS NULL OR era <= 0 OR whip IS NULL OR whip <= 0 OR strikeouts IS NULL OR strikeouts <= 0 OR innings_pitched IS NULL OR innings_pitched <= 0) ORDER BY game_id, team_id; SELECT 'GENERATED_NAME' AS audit_type, game_id, team_id, starter_name FROM starters_current WHERE game_id LIKE '${D()}_%' AND starter_name IN ('Ethan Miller','Liam Johnson','Miguel Rodriguez','David Chen','Sophia Lee','Noah Williams','Olivia Davis','Lucas Garcia','Daniel Kim','Chloe Brown','Noah Davis','Olivia White','William Brown','Sophia Green','Isabella King','James Taylor','Emily Chen','Michael Lee') ORDER BY game_id, team_id;`}function statsMissing(){return `SELECT game_id, team_id, starter_name, era, whip, strikeouts, innings_pitched, source FROM starters_current WHERE game_id LIKE '${D()}_%' AND (era IS NULL OR era <= 0 OR whip IS NULL OR whip <= 0 OR strikeouts IS NULL OR strikeouts <= 0 OR innings_pitched IS NULL OR innings_pitched <= 0) ORDER BY game_id, team_id;`}function latestTasks(){return `SELECT task_id, job_name, status, started_at, finished_at, output_json, error FROM task_runs ORDER BY started_at DESC LIMIT 8;`}function schedulerLog(){return `SELECT task_id, job_name, status, started_at, finished_at, substr(output_json,1,1200) AS output_preview, error FROM task_runs WHERE job_name='run_full_pipeline' ORDER BY started_at DESC LIMIT 10;`}function failedRuns(){return `SELECT task_id, job_name, status, started_at, finished_at, substr(output_json,1,1200) AS output_preview, error FROM task_runs WHERE status != 'success' ORDER BY started_at DESC LIMIT 10;`}function truthAudit(){return `SELECT 'MISSING_STARTER' AS audit_type, g.game_id, COUNT(s.team_id) AS starters_found, GROUP_CONCAT(s.team_id) AS teams_found FROM games g LEFT JOIN starters_current s ON g.game_id=s.game_id WHERE g.game_date='${D()}' GROUP BY g.game_id HAVING starters_found < 2; SELECT 'STAT_OUTLIER' AS audit_type, game_id, team_id, starter_name, era, whip, strikeouts, innings_pitched FROM starters_current WHERE game_id LIKE '${D()}_%' AND (strikeouts > 300 OR innings_pitched > 220 OR era > 10 OR whip > 2) ORDER BY game_id; SELECT 'DUPLICATE_STARTER_NAME' AS audit_type, starter_name, COUNT(*) AS occurrences FROM starters_current WHERE game_id LIKE '${D()}_%' GROUP BY starter_name HAVING occurrences > 1; SELECT 'TEAM_NOT_IN_GAME' AS audit_type, s.game_id, s.team_id, s.starter_name FROM starters_current s JOIN games g ON s.game_id=g.game_id WHERE g.game_date='${D()}' AND s.team_id NOT IN (g.away_team,g.home_team) ORDER BY s.game_id,s.team_id; SELECT 'STALE_ROSTER_PAIR' AS audit_type, game_id, team_id, starter_name FROM starters_current WHERE game_id LIKE '${D()}_%' AND ((starter_name='Justin Verlander' AND team_id IN ('HOU','NYM')) OR (starter_name='Chris Sale' AND team_id IN ('BOS','CHW')) OR (starter_name='Corbin Burnes' AND team_id='MIL') OR (starter_name='Clayton Kershaw' AND team_id='LAD') OR (starter_name='Max Scherzer' AND team_id IN ('NYM','TEX','WSN')) OR (starter_name='Zack Greinke' AND team_id IN ('KC','HOU','ARI','LAD'))) ORDER BY game_id, team_id; SELECT 'GENERATED_NAME' AS audit_type, game_id, team_id, starter_name FROM starters_current WHERE game_id LIKE '${D()}_%' AND starter_name IN ('Ethan Miller','Liam Johnson','Miguel Rodriguez','David Chen','Sophia Lee','Noah Williams','Olivia Davis','Lucas Garcia','Daniel Kim','Chloe Brown','Noah Davis','Olivia White','William Brown','Sophia Green','Isabella King','James Taylor','Emily Chen','Michael Lee') ORDER BY game_id, team_id;`}
updateSlateLabels();setInterval(updateSlateLabels,1000);loadConfig();
function checkBullpen(){return ``}
function listBullpen(){return `SELECT game_id, team_id, last_game_ip, last3_ip, fatigue, source, confidence FROM bullpens_current WHERE game_id LIKE '${D()}_%' ORDER BY game_id, team_id;`}
function checkLineups(){return ``}
function listLineups(){return `SELECT game_id, team_id, slot, player_name, bats, is_confirmed, source, confidence FROM lineups_current WHERE game_id LIKE '${D()}_%' ORDER BY game_id, team_id, slot;`}
function checkUsage(){return ``}
function listUsage(){return `SELECT player_name, team_id, last_game_ab, last_game_hits, lineup_slot FROM player_recent_usage ORDER BY team_id, lineup_slot IS NULL, lineup_slot, player_name LIMIT 120;`}

function finalFeedAudit(){
  return `
SELECT 'GAMES' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) > 0 THEN 'PASS' ELSE 'FAIL' END AS status
FROM games WHERE game_date='${D()}';

SELECT 'STARTERS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = (

SELECT 'BULLPENS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = (

SELECT 'LINEUPS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) >= 0 THEN 'PASS_NON_BLOCKING' ELSE 'FAIL' END AS status
FROM lineups_current WHERE game_id LIKE '${D()}_%';

SELECT 'RECENT_USAGE' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) > 0 THEN 'PASS' ELSE 'WARN_EMPTY' END AS status
FROM player_recent_usage;

SELECT 'PLAYERS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) >= 600 THEN 'PASS' ELSE 'WARN_LOW' END AS status

SELECT 'DUPLICATE_PLAYER_TEAM' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS' ELSE 'FAIL' END AS status

SELECT 'HANDEDNESS_GAPS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS' ELSE 'WARN_REVIEW' END AS status

WHERE bats IS NULL OR bats='' OR (role='P' AND (throws IS NULL OR throws=''));

SELECT 'BAD_STARTERS_HARD' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS' ELSE 'FAIL' END AS status

WHERE game_id LIKE '${D()}_%'
  AND (starter_name LIKE '%Ace%' OR starter_name IN ('TBD','TBA','Unknown','Starter'));

SELECT 'DUPLICATE_STARTERS' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS' ELSE 'FAIL' END AS status
FROM (
  SELECT starter_name FROM starters_current

SELECT 'TEAM_MISMATCH' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = 0 THEN 'PASS' ELSE 'FAIL' END AS status
FROM starters_current s

WHERE g.game_date='${D()}'
  AND s.team_id NOT IN (g.away_team,g.home_team);

SELECT 'DERIVED_CONTEXT' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = (

FROM edge_candidates_hits WHERE slate_date='${D()}';
`;
}

function marketAudit(){return `
SELECT 'MARKETS_TOTAL' AS audit_type, COUNT(*) AS count_value, CASE WHEN COUNT(*) = (

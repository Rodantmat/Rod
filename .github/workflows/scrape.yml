name: MLB Automatic Scraper
on:
  schedule:
    - cron: '0 12,18,0,6 * * *' # Runs at 5am, 11am, 5pm, and 11pm (California Time)
  workflow_dispatch: # This adds the manual "Run Now" button for testing

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Tools
        run: pip install curl_cffi requests
      - name: Start Scraping
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python main.py

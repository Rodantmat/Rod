<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>OXYGEN-COBALT Main System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <h1>OXYGEN-COBALT</h1>
        <p id="versionLabel">v13.78.05 (OXYGEN-COBALT) • Main-1M Priority 1 Matrix Bridge</p>
      </div>
      <button id="debugCopyBtn" class="ghost">Copy Debug</button>
    </header>

    <section id="ingestScreen" class="screen active">
      <div class="card">
        <h2>Screen 1 / Ingest</h2>
        <textarea id="boardInput" placeholder="Paste MLB prop legs here..."></textarea>
        <div class="actions">
          <button id="ingestBtn">Ingest & Validate Board</button>
          <button id="resetBtn" class="ghost">Reset</button>
        </div>
      </div>
      <div id="feedStatus" class="card"></div>
      <div id="poolMount" class="card"></div>
    </section>

    <section id="analysisScreen" class="screen">
      <div class="card split-head">
        <div>
          <h2>Screen 2 / Analysis</h2>
          <p>Runs in batches of 4. Max input pool: 24 legs.</p>
        </div>
        <div class="actions">
          <button id="backBtn" class="ghost">Back</button>
          <button id="runBtn">Run Analysis</button>
        </div>
      </div>
      <div id="healthMount" class="card"></div>
      <div id="analysisMount"></div>
    </section>

    <section class="card log-card">
      <h2>System Log</h2>
      <pre id="systemLog"></pre>
    </section>
  </main>

  <script src="parser.js"></script>
  <script src="connectors.js"></script>
  <script src="ui-engine.js"></script>
  <script src="core.js"></script>
</body>
</html>

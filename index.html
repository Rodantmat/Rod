<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlphaDog v0.0.7 "Titan Reaper"</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <section id="intakeScreen" class="hidden">
      <header class="hero hero-brand">
        <div class="brand-line">
          <span class="brand-icon header-icon"><img src="logo.png" class="app-logo logo" alt="AlphaDog"></span>
          <h1 id="intakeTitle">AlphaDog v0.0.7 "Titan Reaper"</h1>
        </div>
        <p>Paste board chunks, ingest MLB props, track feed status, then run the clean pool.</p>
      </header>

      <section class="card">
        <h2>Paste Board Text</h2>
        <textarea id="boardInput" rows="7" placeholder="Paste PrizePicks-style MLB board text here..."></textarea>
        <div id="runSummary" class="feed-status-inline"></div>
        <div id="feedStatus" class="feed-status-inline"></div>
        <div class="btn-row top-gap">
          <button id="clearBoxBtn" class="secondary">Clear box</button>
        </div>
        <div class="btn-row">
          <button id="ingestBtn">Ingest &amp; Validate Board</button>
        </div>
        <div id="ingestMessage" class="message ingest-status"></div>
      </section>

      <section class="card">
        <h2>Ingested Leg Pool</h2>
        <div class="btn-row top-gap pool-toolbar">
          <div id="poolCounts" class="pool-counts">Accepted: 0&nbsp;&nbsp;&nbsp;Rejected: 0</div>
          <button id="resetAllBtn" class="danger">Reset all</button>
        </div>
        <div id="poolMount"></div>
        <div class="btn-row run-row">
          <button id="runBtn" class="run-btn">Run Audit</button>
        </div>
      </section>
    </section>

    <section id="analysisScreen" class="hidden">
      <header class="hero hero-inline hero-brand">
        <div class="brand-line">
          <span class="brand-icon header-icon"><img src="logo.png" class="app-logo logo" alt="AlphaDog"></span>
          <h1 id="analysisTitle">AlphaDog v0.0.7 "Titan Reaper"</h1>
        </div>
        <div class="btn-row no-top-gap">
          <button id="backBtn" class="secondary">Back</button>
          <button id="copyBtn" class="primary">COPY ANALYSIS REPORT</button>
        </div>
      </header>

      <div id="progressBar" class="progress-bar-container"></div>

      <section class="card analysis-status-card">
        <div id="analysisSummary" class="summary-pills"></div>
        <div id="analysisHint" class="message"></div>
      </section>

      <section class="card analysis-results-card">
        <div class="analysis-connector-wrap">
          <svg id="connectorSvg" class="connector-lines" aria-hidden="true"></svg>
          <div id="audit-results" class="audit-results"><div id="miningGrid" class="mining-grid"></div></div>
        </div>
      </section>

      <section class="card" id="auditorSection">
        <h2>AUDITOR</h2>
        <div id="batchAuditorOutput"></div>
      </section>

      <section class="card">
        <h2>API Configuration</h2>
        <div class="flex-row" style="display:flex; gap:10px; align-items:center;">
          <input type="password" id="apiKeyInput" placeholder="Paste Gemini API Key Here" style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--border); background:#09101d; color:white;">
          <button id="saveKeyBtn" class="btn-primary" style="padding:10px 20px;">Save Key</button>
          <button id="debugConnectionBtn" class="secondary" style="padding:10px 20px;">Debug Connection</button>
        </div>
      </section>

      <section class="card">
        <h2>System Console</h2>
        <div id="systemConsole" class="console-wrap"></div>
      </section>

      <section class="card">
        <h2>RAW GEMINI PAYLOAD (DEBUG)</h2>
        <pre id="rawPayloadOutput" style="background:#09101d; padding:10px; overflow:auto; max-height:300px; color:#66e0a3; font-size:11px;"></pre>
      </section>
    </section>
  </div>

  <script src="./parser.js"></script>
  <script src="./connectors.js"></script>
  <script src="./ui-engine.js"></script>
  <script src="./core.js"></script>
</body>
</html>

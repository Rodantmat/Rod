<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlphaDog v0.0.1</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <div class="eyebrow">PROJECT ALPHADOG</div>
        <h1 id="appTitle">AlphaDog v0.0.1</h1>
        <p class="subcopy">Load up to 24 legs, send them through the Python bridge, and receive hostile-auditor result cards.</p>
      </div>
      <div class="hero-actions">
        <button id="resetAllBtn" class="secondary">Reset All</button>
      </div>
    </header>

    <section class="card">
      <h2>Board Intake</h2>
      <textarea id="boardInput" rows="14" placeholder="Paste PrizePicks-style board text here..."></textarea>
      <div class="toolbar">
        <button id="clearBoxBtn" class="secondary">Clear Box</button>
        <button id="ingestBtn">Load AlphaDog Batch</button>
        <button id="runBtn" class="primary">Run AlphaDog Audit</button>
      </div>
      <div id="ingestMessage" class="message"></div>
      <div id="batchMeta" class="pill-row"></div>
    </section>

    <section class="card">
      <h2>Loaded Batch</h2>
      <div id="poolMount" class="batch-list"></div>
    </section>

    <section class="card">
      <h2>Bridge Configuration</h2>
      <div class="bridge-grid">
        <label>
          <span>Bridge URL</span>
          <input id="bridgeUrlInput" type="text" value="http://127.0.0.1:8000" />
        </label>
        <div class="button-stack">
          <button id="healthBtn" class="secondary">Check Bridge</button>
        </div>
      </div>
      <div id="bridgeStatus" class="message"></div>
    </section>

    <section class="card">
      <h2>AlphaDog Result Cards</h2>
      <div id="analysisHint" class="message">Run the batch to populate hostile-auditor results.</div>
      <div id="resultsMount" class="result-grid"></div>
      <div id="overallScore" class="overall-score hidden"></div>
    </section>

    <section class="card">
      <h2>System Console</h2>
      <div id="systemConsole" class="console-wrap"></div>
    </section>
  </div>

  <script src="parser.js"></script>
  <script src="connectors.js"></script>
  <script src="ui-engine.js"></script>
  <script src="core.js"></script>
</body>
</html>

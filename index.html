<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OXYGEN-COBALT • v13.78.05 (OXYGEN-COBALT)</title>
  <link rel="stylesheet" href="./main-system-styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <h1>OXYGEN-COBALT <span class="version-pill">v13.78.05 (OXYGEN-COBALT)</span></h1>
      <p>Paste MLB board text, ingest the clean pool, and validate the current session.</p>
    </header>

    <main id="screenOne" class="screen screen-active" data-screen="ingest">
      <section class="card">
        <h2>Paste Board Text</h2>
        <textarea id="boardInput" rows="12" placeholder="Paste PrizePicks-style MLB board text here..."></textarea>
        <div id="feedStatus"></div>
        <div class="btn-row">
          <button id="ingestBtn">Ingest &amp; Validate Board</button>
          <button id="analyzeBtn" class="primary-strong" disabled>Go to Screen 2 / Analyze</button>
          <button id="resetBtn" class="secondary">Reset All</button>
        </div>
        <div id="ingestMessage" class="message"></div>
      </section>

      <div id="poolMount"></div>
    </main>

    <main id="screenTwo" class="screen" data-screen="analysis" hidden>
      <section class="card analysis-toolbar">
        <div>
          <h2>Screen 2 • Data Matrix</h2>
          <p class="muted tight">Matrix shell only. Backend packets and scoring will be wired in the next phases.</p>
        </div>
        <div class="btn-row toolbar-actions">
          <button id="backToIngestBtn" class="secondary">Back to Screen 1</button>
          <button id="analysisResetBtn" class="secondary">Reset All</button>
        </div>
      </section>

      <div id="analysisMount"></div>
    </main>
  </div>

  <script src="./main-system-parser.js"></script>
  <script src="./main-system-ui-engine.js"></script>
  <script src="./main-system-core.js"></script>
  <script src="./main-system-connectors.js"></script>
</body>
</html>

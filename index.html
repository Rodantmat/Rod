<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>AlphaDog v1.0</title><link rel="icon" type="image/png" href="/main_alphadog_favicon.png"><link rel="apple-touch-icon" href="/main_alphadog_apple_touch_icon.png"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="AlphaDog"><meta name="theme-color" content="#080f21"><style>
:root{--bg:#080f21;--panel:#111a30;--panel2:#0d1428;--line:#26365f;--text:#f3f7ff;--muted:#aebbd2;--blue:#2477ff;--blue2:#135de0;--green:#65e6a3;--red:#ff6b6b;--yellow:#ffd36e;--shadow:0 18px 40px rgba(0,0,0,.35)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#151f39 0,#080f21 38%,#050913 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;min-height:100vh}.wrap{max-width:1160px;margin:0 auto;padding:18px 14px 42px}.hero{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:4px 0 18px}.brand{display:flex;align-items:center;gap:14px}.logo{width:72px;height:72px;border-radius:50%;background:#fff;padding:4px;box-shadow:var(--shadow)}h1{font-size:38px;line-height:1;margin:0;font-weight:900;letter-spacing:-.04em}.v{font-size:16px;color:var(--muted);font-weight:800;margin-top:5px}.adminBtn,.backBtn{border:1px solid #385083;background:#141f3a;border-radius:15px;color:#fff;font-weight:900;padding:12px 16px;font-size:15px}.primary{border:0;border-radius:15px;background:linear-gradient(180deg,var(--blue),var(--blue2));color:#fff;font-weight:900;padding:12px 16px;font-size:15px;box-shadow:0 10px 22px rgba(36,119,255,.22)}.panel{background:rgba(17,26,48,.92);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.filterTitle{font-size:14px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px}.chips{display:flex;gap:9px;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#141f3a;border-radius:999px;padding:10px 12px;font-weight:800;color:#dfe8fb;user-select:none}.chip input{accent-color:var(--blue);width:18px;height:18px}.controls{display:grid;grid-template-columns:1fr;gap:14px}select,input.pin{appearance:none;background:#141f3a;color:var(--text);border:1px solid var(--line);border-radius:16px;padding:14px 16px;font-size:17px;font-weight:850;width:100%}.bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:12px 2px 14px}.status{color:var(--muted);font-size:14px;font-weight:750}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}.card{position:relative;overflow:hidden;background:linear-gradient(180deg,#141e36,#0c1428);border:1px solid #2b3a65;border-radius:22px;padding:15px;min-height:292px;box-shadow:var(--shadow)}.card:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 90% 15%,rgba(36,119,255,.18),transparent 35%);pointer-events:none}.top{position:relative;display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.player{font-size:20px;line-height:1.06;font-weight:950;letter-spacing:-.03em}.badge{flex:0 0 auto;border-radius:999px;padding:6px 8px;font-weight:950;font-size:11px;border:1px solid #3b4c7d;background:#101a31;text-transform:uppercase}.goblin{color:var(--green)}.demon{color:#ff7676}.regular{color:#dce7ff}.teams{position:relative;color:var(--muted);font-size:13px;font-weight:800;margin-top:8px;line-height:1.35}.date{position:relative;margin-top:9px;color:#c8d5ec;font-size:13px;font-weight:750}.lineBox{position:relative;margin-top:12px;display:inline-flex;gap:6px;align-items:center;border:1px solid #334573;background:#0b1326;border-radius:14px;padding:8px 10px;font-weight:950;font-size:13px}.side{color:#fff}.score{position:absolute;right:14px;bottom:12px;text-align:right}.scoreNum{font-size:34px;font-weight:1000;letter-spacing:-.05em}.scoreLbl{color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase}.comment{position:relative;margin-top:13px;color:#c4d1e6;font-size:12.5px;line-height:1.33;max-width:100%;padding-right:4px;margin-bottom:58px;font-weight:750}.empty{text-align:center;color:var(--muted);padding:44px 20px;border:1px dashed var(--line);border-radius:22px;background:#10182d}.err{color:#ff8b8b}.good{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--yellow)}.hidden{display:none!important}.adminGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}.dataCard{background:linear-gradient(180deg,#141e36,#0c1428);border:1px solid #2b3a65;border-radius:22px;padding:15px;box-shadow:var(--shadow);min-height:174px}.dataTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.dataTitle{font-size:20px;font-weight:950}.freq{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase}.check{font-size:22px;font-weight:1000}.metric{margin-top:10px;color:#c9d6ec;font-size:13px;line-height:1.4;font-weight:750}.quality{font-size:30px;font-weight:1000;margin-top:8px}.small{font-size:12px;color:var(--muted);line-height:1.35}.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;padding:18px;z-index:10}.modalBox{background:#111a30;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px;max-width:380px;width:100%}.modalBox h2{margin:0 0 10px}.modalActions{display:flex;gap:10px;margin-top:12px}.modalActions button{flex:1}@media(max-width:650px){.wrap{padding:14px 10px 36px}.hero{align-items:flex-start}.brand{gap:10px}.logo{width:58px;height:58px}h1{font-size:32px}.panel{border-radius:21px;padding:13px}.grid,.adminGrid{grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.card{border-radius:20px;padding:12px;min-height:314px}.player,.dataTitle{font-size:17px}.teams,.date{font-size:12px}.lineBox{font-size:12px;padding:7px 8px}.scoreNum{font-size:30px}.comment{font-size:11.5px;max-width:100%;line-height:1.34;margin-bottom:62px}.chip{padding:9px 10px;font-size:14px}.adminBtn,.primary,.backBtn{padding:10px 12px}}
</style></head><body><main class="wrap"><header class="hero"><div class="brand"><img class="logo" src="/main_alphadog_logo.png" alt="AlphaDog logo"><div><h1>AlphaDog</h1><div class="v">v1.0</div></div></div><button class="adminBtn" id="adminOpen">Admin</button></header><section id="boardScreen"><section class="panel controls"><div><p class="filterTitle">Prop lines</p><div class="chips" id="propFilters"></div></div><div><p class="filterTitle">Line type</p><div class="chips" id="typeFilters"></div></div><div><p class="filterTitle">Final score</p><select id="scoreFilter"><option value="90">90+</option><option value="85">85+</option><option value="80">80+</option><option value="75">75+</option><option value="70" selected>70+</option><option value="60">60+</option></select></div></section><div class="bar"><div class="status" id="status">Loading board...</div><button class="primary" id="refresh">Refresh</button></div><section class="grid" id="cards"></section></section><section id="adminScreen" class="hidden"><div class="bar"><button class="backBtn" id="backBoard">← Board</button><button class="primary" id="fullRefresh">Refresh Full Data</button></div><div class="panel"><div class="status" id="adminStatus">Loading freshness...</div><div class="small">Sleeper stays manual. Full refresh does not run static data.</div></div><section class="adminGrid" id="adminCards"></section></section></main><div class="modal hidden" id="pinModal"><div class="modalBox"><h2>Admin PIN</h2><p class="small">Enter PIN to open the data console.</p><input class="pin" id="pinInput" inputmode="numeric" type="password" placeholder="PIN"><div class="modalActions"><button class="backBtn" id="pinCancel">Cancel</button><button class="primary" id="pinGo">Open</button></div><p class="err" id="pinErr"></p></div></div><script>
const TEAM={ARI:'Arizona Diamondbacks',ATL:'Atlanta Braves',BAL:'Baltimore Orioles',BOS:'Boston Red Sox',CHC:'Chicago Cubs',CWS:'Chicago White Sox',CHW:'Chicago White Sox',CIN:'Cincinnati Reds',CLE:'Cleveland Guardians',COL:'Colorado Rockies',DET:'Detroit Tigers',HOU:'Houston Astros',KC:'Kansas City Royals',KCR:'Kansas City Royals',LAA:'Los Angeles Angels',LAD:'Los Angeles Dodgers',MIA:'Miami Marlins',MIL:'Milwaukee Brewers',MIN:'Minnesota Twins',NYM:'New York Mets',NYY:'New York Yankees',ATH:'Athletics',OAK:'Athletics',PHI:'Philadelphia Phillies',PIT:'Pittsburgh Pirates',SD:'San Diego Padres',SEA:'Seattle Mariners',SF:'San Francisco Giants',STL:'St. Louis Cardinals',TB:'Tampa Bay Rays',TEX:'Texas Rangers',TOR:'Toronto Blue Jays',WSH:'Washington Nationals',WAS:'Washington Nationals'};
let rows=[];let filters={props:new Set(['HITS','RBI','TOTAL_BASES']),types:new Set(['goblin','demon','regular']),score:70};const $=id=>document.getElementById(id);function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function team(v){return TEAM[v]||v||'Unknown Team'}function propLabel(p){return p==='TOTAL_BASES'?'Total Bases':p==='RBI'?'RBI':p==='HITS'?'Hits':p}function typeLabel(t){return t==='regular'?'Regular':t.charAt(0).toUpperCase()+t.slice(1)}function fmtDate(v,fallback){if(v){let d=new Date(v);if(!isNaN(d))return new Intl.DateTimeFormat(undefined,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}).format(d);if(String(v).trim())return String(v)}return fallback||'Game time unavailable'}
function reasonText(m){const id=String(m&&m.id||'').toUpperCase();const reason=String(m&&m.reason||'').replace(/_/g,' ');if(id.includes('LINEUP'))return reason&&reason!=='null'?('lineup position '+reason):'lineup position';if(id.includes('GAME_TOTAL'))return reason&&reason!=='null'?('run environment '+reason):'run environment';if(id.includes('PARK'))return reason&&reason!=='null'?('ballpark fit '+reason):'ballpark fit';if(id.includes('WEATHER'))return reason&&reason!=='null'?('weather '+reason):'weather context';if(id.includes('MARKET'))return reason&&reason!=='null'?('book coverage '+reason):'market depth';if(id.includes('HAND'))return reason&&reason!=='null'?('handedness matchup '+reason):'handedness matchup';if(id.includes('RBI'))return reason&&reason!=='null'?('RBI table setup '+reason):'RBI table setup';if(id.includes('ALT')||id.includes('LINE_TYPE'))return 'alt-line drag';return reason||String(m&&m.id||'context factor')}
function friendlyComment(r){const risks=(r.risks||[]).concat((r.risk_notes_parsed&&r.risk_notes_parsed.risks)||[]);const mods=(r.derived_modifiers||[]).map(m=>({...m,value:Number(m.value||0)}));const score=Number(r.final_score||0);const noVig=Number(r.no_vig_prob||0);const market=Number(r.market_confidence||0);const books=Number(r.book_count||0);const pos=mods.filter(m=>m.value>0.35).sort((a,b)=>b.value-a.value);const neg=mods.filter(m=>m.value<-0.35).sort((a,b)=>a.value-b.value);const lead=pos[0]?reasonText(pos[0]):(noVig>=0.6?'market lean':'baseline profile');const second=pos[1]?reasonText(pos[1]):(market>=0.45?'market agreement':(books>=3?'book depth':'limited book depth'));let caution='';if(r.candidate_status==='DEFERRED_UNPICKABLE'||risks.includes('pickability_gate_failed'))caution=' Pickability gate is not confirmed, so it stays deferred.';else if(risks.includes('under_cap'))caution=' Under-side cap keeps the ceiling controlled.';else if(risks.includes('thin_under_3_books')||books<3)caution=' Book coverage is thin, so confidence stays controlled.';else if(neg[0])caution=' Main drag: '+reasonText(neg[0])+'.';let tier=score>=80?'Strong profile':score>=75?'Playable watchlist':score>=70?'Watchlist lean':score>=65?'Low-grade lean':'Weak lean';let marketLine=noVig?` No-vig support is ${(noVig*100).toFixed(0)}%.`:'';if(pos.length>=3)return `${tier}: ${lead} is the main push, with ${second} and ${reasonText(pos[2])} adding support.${caution}${marketLine}`;if(pos.length>=2)return `${tier}: ${lead} is the main push, with ${second} as the second support point.${caution}${marketLine}`;if(pos.length===1)return `${tier}: ${lead} is carrying most of this read.${caution}${marketLine}`;if(neg.length)return `${tier}: no major positive context is carrying it; ${reasonText(neg[0])} is the main concern.${marketLine}`;return `${tier}: modest market lean with no standout context driver.${caution}${marketLine}`}
function chip(label,value,setName){const id=setName+'_'+value;return '<label class="chip" for="'+id+'"><input id="'+id+'" type="checkbox" checked data-set="'+setName+'" data-value="'+value+'">'+label+'</label>'}function buildFilters(){$('propFilters').innerHTML=['TOTAL_BASES','RBI','HITS'].map(p=>chip(propLabel(p),p,'props')).join('');$('typeFilters').innerHTML=['goblin','demon','regular'].map(t=>chip(typeLabel(t),t,'types')).join('');document.querySelectorAll('input[type=checkbox]').forEach(el=>el.onchange=()=>{const s=filters[el.dataset.set];el.checked?s.add(el.dataset.value):s.delete(el.dataset.value);render()});$('scoreFilter').onchange=e=>{filters.score=Number(e.target.value);render()}}function normalizeType(r){let t=String(r.board_line_type||r.line_type||'regular').toLowerCase();if(t==='standard'||t==='alt')t='regular';return ['goblin','demon','regular'].includes(t)?t:'regular'}
function render(){let shown=rows.filter(r=>filters.props.has(r.prop_family)&&filters.types.has(normalizeType(r))&&Number(r.final_score||0)>=filters.score);$('status').textContent=shown.length+' shown / '+rows.length+' loaded';if(!shown.length){$('cards').innerHTML='<div class="empty" style="grid-column:1/-1">No legs match these filters.</div>';return}$('cards').innerHTML=shown.map(r=>{let t=normalizeType(r);let score=Number(r.final_score||0);return '<article class="card"><div class="top"><div class="player">'+esc(r.player_name)+'</div><div class="badge '+t+'">'+typeLabel(t)+'</div></div><div class="teams">'+esc(team(r.team))+'<br>vs '+esc(team(r.opponent))+'</div><div class="date">'+esc(fmtDate(r.game_datetime_utc||r.start_time,r.game_time_label))+'</div><div class="lineBox"><span>'+esc(propLabel(r.prop_family))+'</span><span class="side">'+esc(r.line_direction)+'</span><span>'+esc(r.line_number)+'</span></div><div class="comment">'+esc(friendlyComment(r))+'</div><div class="score"><div class="scoreLbl">Score</div><div class="scoreNum">'+score.toFixed(1)+'</div></div></article>'}).join('')}async function load(){try{$('status').textContent='Loading board...';let r=await fetch('/main_alphadog_board?score_min=0&t='+Date.now());let j=await r.json();if(!j.ok)throw Error(j.error||'Board load failed');rows=j.rows||[];render()}catch(e){$('status').innerHTML='<span class="err">'+esc(e.message||e)+'</span>';$('cards').innerHTML='<div class="empty err" style="grid-column:1/-1">Could not load board.</div>'}}
function showAdmin(){document.body.scrollTop=0;document.documentElement.scrollTop=0;$('boardScreen').classList.add('hidden');$('adminScreen').classList.remove('hidden');loadAdmin()}function showBoard(){$('adminScreen').classList.add('hidden');$('boardScreen').classList.remove('hidden')}function openPin(){$('pinModal').classList.remove('hidden');$('pinInput').value='';$('pinErr').textContent='';setTimeout(()=>$('pinInput').focus(),50)}function closePin(){$('pinModal').classList.add('hidden')}function unlock(){if($('pinInput').value==='3971'){closePin();showAdmin()}else $('pinErr').textContent='Wrong PIN.'}
function statusIcon(ok){return ok?'<span class="check good">✓</span>':'<span class="check bad">×</span>'}function fmt(v){if(!v)return 'Not found';let d=new Date(String(v).replace(' ','T')+'Z');if(!isNaN(d))return new Intl.DateTimeFormat(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}).format(d);return String(v)}function adminCard(c){let cls=c.quality_score>=90?'good':c.quality_score>=75?'warn':'bad';return '<article class="dataCard"><div class="dataTop"><div><div class="dataTitle">'+esc(c.title)+'</div><div class="freq">'+esc(c.frequency)+'</div></div>'+statusIcon(c.ok)+'</div><div class="metric">Last Update: '+esc(fmt(c.last_update))+'</div><div class="quality '+cls+'">'+esc(c.quality_score)+'/100</div><div class="small">Data Quality: '+esc(c.quality_note||'')+'</div><div class="metric">Next Update: '+esc(c.next_update||'By schedule')+'</div></article>'}
async function loadAdmin(){try{$('adminStatus').textContent='Loading freshness...';let r=await fetch('/main_alphadog_admin_status?t='+Date.now());let j=await r.json();if(!j.ok)throw Error(j.error||'Admin status failed');$('adminStatus').textContent='Freshness loaded • '+j.version;$('adminCards').innerHTML=(j.cards||[]).map(adminCard).join('')}catch(e){$('adminStatus').innerHTML='<span class="err">'+esc(e.message||e)+'</span>'}}
async function startFullRefresh(){try{let ok=confirm('Start full data refresh now? You can close the browser after it starts.');if(!ok)return;$('adminStatus').textContent='Starting full refresh...';let r=await fetch('/main_alphadog_admin_refresh',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({pin:'3971'})});let j=await r.json().catch(()=>({ok:false,error:'main_ui_non_json_response'}));if(!j.ok){let msg=j.error||'Refresh start failed';if(j.control_status)msg+=' | status '+j.control_status;if(j.control_text_preview)msg+=' | '+String(j.control_text_preview).slice(0,180);if(j.fix)msg+=' | '+j.fix;throw Error(msg)}alert('Data Refresh Started
Estimated time: '+(j.estimated_minutes||'8-15')+' minutes
Job ID: '+(j.refresh_id||j.task_id||'created'));loadAdmin()}catch(e){alert('Refresh failed to start: '+(e.message||e));loadAdmin()}}
$('refresh').onclick=load;$('adminOpen').onclick=openPin;$('pinCancel').onclick=closePin;$('pinGo').onclick=unlock;$('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});$('backBoard').onclick=showBoard;$('fullRefresh').onclick=startFullRefresh;buildFilters();load();
</script></body></html>
